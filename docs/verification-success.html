<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-posta Doğrulandı - KlickZeit</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 12px; }
    p { color: #666; line-height: 1.6; font-size: 15px; }
    .app { color: #4CAF50; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      body { background: #121212; }
      .card { background: #1e1e1e; }
      h1 { color: #fff; }
      p { color: #ccc; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>E-posta doğrulandı</h1>
    <p>
      <span class="app">KlickZeit</span> hesabınız doğrulandı.
      Uygulamaya dönüp e-posta ve şifrenizle giriş yapabilirsiniz.
    </p>
  </div>
</body>
</html>
